name: Restore from S3 backup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      backup_id:
        description: 'Backup timestamp folder (e.g. 2026-04-05_120000). Leave empty for latest.'
        required: false
        type: string

env:
  SERVER_IP: ${{ github.event.inputs.environment == 'production' && '217.76.58.119' || '62.171.181.244' }}
  IMAGE_TAG: ${{ github.event.inputs.environment == 'production' && 'latest' || 'demo' }}
  DEPLOY_ENV: ${{ github.event.inputs.environment }}
  RESTORE_PATH: /opt/erpnext
  DOMAIN: ${{ github.event.inputs.environment == 'production' && 'erp-cheese.deepzide.com' || 'erp-cheese-dev.deepzide.com' }}
  LETSENCRYPT_EMAIL: lesterdprez.work@gmail.com
  SITES_RULE: ${{ github.event.inputs.environment == 'production' && 'Host(`erp-cheese.deepzide.com`)' || 'Host(`erp-cheese-dev.deepzide.com`)' }}

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ github.event.inputs.environment == 'production' && secrets.SSH_KEY_REFACTOR || secrets.SSH_KEY_PRIVATE }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }} "echo 'SSH OK'"

      - name: Sync files to server
        run: |
          printf 'TAG=%s\nDEPLOY_ENV=%s\nSITES_RULE=%s\nLETSENCRYPT_EMAIL=%s\nDOMAIN=%s\n' \
            "${{ env.IMAGE_TAG }}" "${{ env.DEPLOY_ENV }}" "${{ env.SITES_RULE }}" "${{ env.LETSENCRYPT_EMAIL }}" "${{ env.DOMAIN }}" > .env.deploy
          scp -i ~/.ssh/deploy_key .env.deploy root@${{ env.SERVER_IP }}:${{ env.RESTORE_PATH }}/.env
          scp -i ~/.ssh/deploy_key docker-compose.yml root@${{ env.SERVER_IP }}:${{ env.RESTORE_PATH }}/docker-compose.yml
          scp -i ~/.ssh/deploy_key scripts/restore.sh root@${{ env.SERVER_IP }}:${{ env.RESTORE_PATH }}/restore.sh
          scp -i ~/.ssh/deploy_key scripts/backup.sh root@${{ env.SERVER_IP }}:${{ env.RESTORE_PATH }}/backup.sh

      - name: Restore
        run: |
          BACKUP_ID="${{ github.event.inputs.backup_id }}"
          echo "Restoring on ${{ github.event.inputs.environment }} (${{ env.SERVER_IP }})"
          echo "Backup ID: ${BACKUP_ID:-latest}"
          ssh -i ~/.ssh/deploy_key root@${{ env.SERVER_IP }} "
            set -e
            cd ${{ env.RESTORE_PATH }}

            echo '>>> Ensuring stack is running...'
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose up -d

            echo '>>> Configuring AWS credentials...'
            mkdir -p /root/.aws
            chmod 700 /root/.aws
            cat > /root/.aws/credentials <<CREDS
          [default]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CREDS
            chmod 600 /root/.aws/credentials
            cat > /root/.aws/config <<CFG
          [default]
          region = us-east-1
          CFG
            chmod 600 /root/.aws/config

            echo '>>> Waiting for MariaDB...'
            for i in \$(seq 1 60); do
              if docker compose exec -T db mysqladmin ping -h db --silent 2>/dev/null; then
                break
              fi
              sleep 5
            done

            echo '>>> Waiting for backend...'
            for i in \$(seq 1 60); do
              if docker compose exec -T backend bench --version >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done

            echo '>>> Running restore...'
            DEPLOY_ENV=${{ env.DEPLOY_ENV }} bash restore.sh ${BACKUP_ID}
          "
