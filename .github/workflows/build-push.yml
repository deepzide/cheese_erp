                  cp -aL \"\$src/\$app/dist/.\" \"/target/\$app/dist/\"
                fi
              done
              app_frontend=/home/frappe/frappe-bench/apps/cheese/cheese/public/frontend
              if [ -d \"\$app_frontend\" ]; then
                mkdir -p /target/cheese/frontend
                cp -aL \"\$app_frontend/.\" /target/cheese/frontend/
              elif [ -d \"\$src/cheese/frontend\" ]; then
