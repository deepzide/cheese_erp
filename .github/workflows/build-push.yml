name: Build, Push & Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  SERVER_IP: ${{ github.ref_name == 'main' && '217.76.58.119' || '62.171.181.244' }}
  IMAGE_TAG: ${{ github.ref_name == 'main' && 'latest' || 'demo' }}
  DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
  DOMAIN: ${{ github.ref_name == 'main' && 'erp-cheese.deepzide.com' || 'erp-cheese-dev.deepzide.com' }}
  LETSENCRYPT_EMAIL: lesterdprez.work@gmail.com
  SITES_RULE: ${{ github.ref_name == 'main' && 'Host(`erp-cheese.deepzide.com`)' || 'Host(`erp-cheese-dev.deepzide.com`)' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/deepzide/cheese:${{ env.IMAGE_TAG }}
          build-args: |
            FRAPPE_BRANCH=version-15
          secrets: |
            CHEESE_ERP_URL=https://x-access-token:${{ secrets.GH_PAT }}@github.com/deepzide/cheese_erp.git
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/deepzide/cheese:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/deepzide/cheese:buildcache,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ github.ref_name == 'main' && secrets.SSH_KEY_REFACTOR || secrets.SSH_KEY_PRIVATE }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }} "echo 'SSH OK'"

      - name: Sync files to server
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.yml root@${{ env.SERVER_IP }}:/opt/erpnext/docker-compose.yml
          scp -i ~/.ssh/deploy_key scripts/backup.sh root@${{ env.SERVER_IP }}:/opt/erpnext/backup.sh
          scp -i ~/.ssh/deploy_key scripts/restore.sh root@${{ env.SERVER_IP }}:/opt/erpnext/restore.sh

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ env.SERVER_IP }} "
            set -e
            cd /opt/erpnext
            echo '>>> Logging in to ghcr.io...'
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo '>>> Writing .env...'
            cat > .env <<ENVEOF
          TAG=${{ env.IMAGE_TAG }}
          DEPLOY_ENV=${{ env.DEPLOY_ENV }}
          SITES_RULE=${{ env.SITES_RULE }}
          LETSENCRYPT_EMAIL=${{ env.LETSENCRYPT_EMAIL }}
          DOMAIN=${{ env.DOMAIN }}
          ENVEOF
            echo '>>> Pulling image ghcr.io/deepzide/cheese:${{ env.IMAGE_TAG }}...'
            docker compose pull
            echo '>>> Restarting stack...'
            docker compose up -d
            echo '>>> Waiting for backend...'
            for i in \$(seq 1 60); do
              if docker compose exec -T backend bench --version >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done
            echo '>>> Checking if site exists...'
            if ! docker compose exec -T backend bench --site frontend list-apps >/dev/null 2>&1; then
              echo '>>> Creating site...'
              docker compose run --rm create-site
            fi
            echo '>>> Running migrations...'
            docker compose exec -T backend bench --site frontend migrate
            echo '>>> Clearing cache...'
            docker compose exec -T backend bench --site frontend clear-cache
            docker compose exec -T backend bench --site frontend clear-website-cache
            echo '>>> Deploy complete!'
          "
