    environment: production
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_IP: 144.91.95.172
      DEPLOY_DOMAIN: erp-viventi.deepzide.com
      DEPLOY_ENV: production
      DEPLOY_KEY: ${{ secrets.SSH_KEY_VIVENTI }}

    steps:
